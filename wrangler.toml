name = "papra-email-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-22"

# Do not put WEBHOOK_URL / Access vars here: `wrangler deploy` would push them to production
# and overwrite the values you set in the Cloudflare dashboard.
# Local dev: copy `.dev.vars.example` → `.dev.vars` (gitignored) and run `wrangler dev`.

[observability]

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
