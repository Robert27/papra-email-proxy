name = "papra-email-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-22"

# Local dev defaults (wrangler dev). Override any key in `.dev.vars` without committing secrets.
# Required for the worker: also set WEBHOOK_SECRET in `.dev.vars` (or `wrangler secret put WEBHOOK_SECRET` for deploy).
# Optional Access: set CF_ACCESS_CLIENT_SECRET in `.dev.vars` when using CF_ACCESS_CLIENT_ID.
[vars]
WEBHOOK_URL = "https://your-papra-host.example/api/intake-emails/ingest"
CF_ACCESS_CLIENT_ID = ""

[observability]

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
